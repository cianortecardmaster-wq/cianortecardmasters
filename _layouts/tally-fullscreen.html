<!doctype html>
<html lang="{{ site.lang | default: 'pt-BR' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% assign meta_description = page.description | default: page.summary | default: site.description %}
  <meta name="description" content="{{ meta_description | truncate: 165 | escape }}">
  {% if page.keywords %}<meta name="keywords" content="{{ page.keywords | join: ', ' | escape }}">{% endif %}
  <meta name="theme-color" content="#06110b">
  <link rel="icon" type="image/png" sizes="96x96" href="{{ '/assets/img/favicon-96x96.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="48x48" href="{{ '/assets/img/favicon-48x48.png' | relative_url }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/pwa/site/icon-180.png' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta property="og:locale" content="pt_BR">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="{{ site.title | escape }}">
  <meta property="og:title" content="{{ page.title | escape }}">
  <meta property="og:description" content="{{ meta_description | truncate: 200 | escape }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  {% if page.image %}
    {% if page.image contains '://' %}
      <meta property="og:image" content="{{ page.image | escape }}">
    {% else %}
      <meta property="og:image" content="{{ page.image | absolute_url }}">
    {% endif %}
  {% endif %}
  {% if page.image_alt %}<meta property="og:image:alt" content="{{ page.image_alt | escape }}">{% endif %}

  <script async src="https://tally.so/widgets/embed.js"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050806;
    }

    .tally-fullscreen-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }

    .tally-noscript {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f6f1df;
      font: 18px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      background: radial-gradient(circle at top, rgba(31,184,92,.22), transparent 28rem), #050806;
    }

    .tally-noscript a {
      color: #d4af37;
      font-weight: 700;
    }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ page.title | jsonify }},
    "description": {{ meta_description | strip_html | strip_newlines | jsonify }},
    "url": "{{ page.url | absolute_url }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Organization",
      "name": {{ page.author | default: site.title | jsonify }}
    },
    "publisher": {
      "@type": "Organization",
      "name": {{ site.title | jsonify }}
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>
</head>
<body>
  <iframe
    class="tally-fullscreen-frame"
    data-tally-src="{{ page.tally_url | escape }}"
    width="100%"
    height="100%"
    frameborder="0"
    marginheight="0"
    marginwidth="0"
    title="{{ page.title | escape }}"
  ></iframe>

  <noscript>
    <div class="tally-noscript">
      <p>
        Para responder ao {{ page.title }}, ative o JavaScript ou
        <a href="{{ page.tally_url | escape }}">abra o formulário diretamente</a>.
      </p>
    </div>
  </noscript>
</body>
</html>
