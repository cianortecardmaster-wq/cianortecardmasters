# Para publicar uma nova atividade:
# 1. Copie um bloco abaixo.
# 2. Troque published: false para published: true.
# 3. Preencha title, description, tipo, jogo, difficulty, format e url/download_url.
# 4. O filtro da página /atividades/ é gerado automaticamente pelos campos tipo e jogo.
#
# Campos recomendados:
# - title: nome da atividade exibido no card
# - description: resumo curto para SEO e leitura rápida
# - tipo: Caça-palavras | Palavras Cruzadas | Quiz | Picross | Color Picross | etc.
# - jogo: Flesh and Blood | Pokémon TCG | Magic | One Piece TCG | RPG | Cianorte Card Masters | etc.
# - url: página HTML jogável ou página de detalhes
# - download_url: PDF, imagem ou arquivo para baixar
# - published: false mantém a atividade escondida até estar pronta

